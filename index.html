```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GoldCode </title>

<style>
body{
margin:0;
font-family:monospace;
background:#1e1e1e;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* Top bar */

.topbar{
background:#333;
padding:8px 15px;
display:flex;
gap:20px;
font-size:14px;
}

/* Layout */

.container{
display:grid;
grid-template-columns:200px 1fr 1fr;
flex:1;
}

/* Explorer */

.explorer{
background:#252526;
padding:10px;
border-right:1px solid #444;
}

.explorer h3{
margin-top:0;
}

.file{
padding:5px;
cursor:pointer;
}

.file:hover{
background:#333;
}

/* Editor */

.editor{
background:#1e1e1e;
border-right:1px solid #444;
}

textarea{
width:100%;
height:100%;
background:#1e1e1e;
color:#9cdcfe;
border:none;
outline:none;
padding:10px;
font-size:14px;
}

/* Preview */

.preview{
background:white;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* Run button */

.run{
position:absolute;
top:8px;
right:10px;
background:#0e639c;
border:none;
padding:6px 12px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
File
Edit
View
Run
Terminal
Help
<button class="run" onclick="runCode()">Run</button>
</div>

<div class="container">

<div class="explorer">
<h3>Explorer</h3>

<div class="file">index.html</div>
<div class="file">style.css</div>
<div class="file">script.js</div>

</div>

<div class="editor">

<textarea id="code">
<!DOCTYPE html>
<html>
<head>
<title>My GoldCode Site</title>
</head>

<body>

<h1>Hello from GoldCode!</h1>
<p>This looks like VS Code 😎</p>

</body>
</html>
</textarea>

</div>

<div class="preview">

<iframe id="preview"></iframe>

</div>

</div>

<script>

function runCode(){
let code=document.getElementById("code").value;
document.getElementById("preview").srcdoc=code;
}

</script>

</body>
</html>
```
